<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7FFFD4"/>
      <stop offset="100%" stop-color="#40E0D0"/>
    </linearGradient>
    <pattern id="bubbles" patternUnits="userSpaceOnUse" width="80" height="80">
      <circle cx="20" cy="20" r="4" fill="white" opacity="0.3"/>
      <circle cx="60" cy="50" r="6" fill="white" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#oceanGrad)"/>
  <rect width="100%" height="100%" fill="url(#bubbles)"/>
</svg>